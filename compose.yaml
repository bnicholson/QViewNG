
services:

  pgdb:
    image: "postgres:18"
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - "qviewng-db:/var/lib/postgresql"
      - ./postgres-init:/docker-entrypoint-initdb.d:ro  # Init scripts directory (read-only)
    restart: unless-stopped
    networks:
      - qviewng-net
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d qview -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  qviewng:
    image: "${DOCKER_APP_IMAGE}"
    build: .
    environment:
      - JWT_SECRET
      - BACKEND_PORT
      - FRONTEND_URL
      - SMTP_HOST
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
    restart: unless-stopped
    networks:
      - qviewng-net
    depends_on:
      pgdb:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

  cloudflare-tunnel:
    image: "cloudflare/cloudflared:latest"
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - qviewng-net
    depends_on:
      - qviewng

networks:
  qviewng-net: {}

volumes:
  qviewng-db: